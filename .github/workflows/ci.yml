name: CI

# Gate qualité (AD-13, NFR1) : lint + typecheck + tests sur push et PR.
# L'app vit dans daily-wheel/ ; le workflow vit à la racine du repo et `cd` dedans.
# Pas de secrets Supabase en CI → les tests live se skippent ; le gate repose sur
# lint + typecheck + tests purs. Le `next build` réel est validé par Vercel (vraies env).

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daily-wheel
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: daily-wheel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test
